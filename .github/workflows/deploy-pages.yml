name: Deploy landing page

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site with booking URL
        env:
          BOOKING_FORM_URL: ${{ vars['BOOKING_FORM_URL'] || '' }}
        run: |
          mkdir public
          if [ -z "${BOOKING_FORM_URL}" ]; then
            echo "BOOKING_FORM_URL is empty. Set it in Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi
          echo "BOOKING_FORM_URL is set."
          perl -0pe 's/__BOOKING_FORM_URL__/$ENV{BOOKING_FORM_URL}/g' index.html > public/index.html
          if grep -q "__BOOKING_FORM_URL__" public/index.html; then
            echo "Placeholder replacement failed."
            exit 1
          fi
          if ! grep -q "form.jotform.com" public/index.html; then
            echo "Expected booking form domain not found in generated HTML."
            exit 1
          fi

      - name: Verify generated booking link
        run: |
          echo "Checking generated HTML for booking link"
          grep -n "form.jotform.com" public/index.html
          grep -n "const bookingUrl =" public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
